    <!--  form  -->
    <div class="container" id="comeJoinUs">
        <div class="row row-content">
            <div class="col-12">
                <h2>Come Join Us!</h2>
                <hr />
            </div>

            <div class="col-md-10">
                <form class="m-3">
                    <div class="form-group row">
                        <label for="firstName" class="col-md-2 col-form-label">First Name</label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" id="firstName" name="firstName"
                                placeholder="First Name" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="lastName" class="col-md-2 col-form-label">Last Name</label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" id="lastName" name="lastName"
                                placeholder="Last Name" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="telNum" class="col-md-2 col-form-label">Contact Tel.</label>
                        <div class="col-md-10">
                            <input type="tel" class="form-control" id="telNum" name="telNum"
                                placeholder="(xxx)xxx-xxxx" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="email" class="col-md-2 col-form-label">Email</label>
                        <div class="col-md-10">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email" />
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="date" class="col-md-2 col-form-label">Start Date</label>
                        <div class="col-md-10">
                            <input type="date" class="form-control" id="date" placeholder="Start Date">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="jobPosition" class="col-md-2 col-form-label">Job Search</label>
                        <select type="text" id="jobPosition" class="col-md-5 col-form-label form-control"
                            name="jobPosition">
                            <option value="selectPosition">Select Position</option>
                            <option value="barista">Barista</option>
                            <option value="frontOfHouse">Front of House</option>
                            <option value="lineCook">Line Cook</option>
                            <option value="prepCook">Prep Cook</option>
                            <option value="dish">Dish</option>
                            <option value="baker">Baker</option>
                        </select>

                        <select type="text" id="jobExperience" class="col-md-5 col-form-label form-control"
                            name="jobExperience">
                            <option value="experienceLevel">Experience Level</option>
                            <option value="noExperience">No Experience</option>
                            <option value="lessThan1">Less than 1 year</option>
                            <option value="years1-3">1-3 years</option>
                            <option value="years3-5">3-5 years</option>
                            <option value="years5+">5 years+</option>
                        </select>
                    </div>

                    <div class="form-group row">
                        <label for="comments" class="col-md-2 col-form-label">Comments</label>
                        <textarea id="comments" class="col-md-10 form-control" name="comments"
                            placeholder="write about yourself" rows="8"></textarea>
                    </div>
                    <div class="form-group row">
                        <div class="col-12">
                            <button type="submit" class="col-3 btn btn-dark text-white ">Apply
                                Now</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

                    <a class="btn btn-social-icon btn-instagram socialButton" href="http://instagram.com/"><i class="fa fa-instagram"></i></a>
                    <a class="btn btn-social-icon btn-facebook socialButton" href="http://facebook.com/"><i class="fa fa-facebook"></i></a>
                    <a class="btn btn-social-icon btn-twitter socialButton" href="http://twitter.com/"><i class="fa fa-twitter"></i></a>
                    <a class="btn btn-social-icon btn-youtube socialButton" href="http://youtube.com/"><i class="fa fa-youtube"></i></a>
                </div>
                <div class="col-sm-4 text-center">

                    <a role="button" class="btn btn-link" href="tel:+16155551234"><i class="fa fa-phone"></i>1-615-555-1234</a><br />

                    <a role="button" class="btn btn-link" href="joinOurTeam.html">Join Our Team</a>
